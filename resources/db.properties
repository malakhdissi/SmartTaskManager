# =============================================================================
# Smart Task Manager — database configuration
# =============================================================================
# Local development defaults. Override per machine if needed.
#
# Setup (one-time), from a MySQL shell:
#   CREATE DATABASE smarttask CHARACTER SET utf8mb4;
#   CREATE USER 'smarttask'@'localhost' IDENTIFIED BY 'change-me';
#   GRANT ALL PRIVILEGES ON smarttask.* TO 'smarttask'@'localhost';
#
# The application creates its tables automatically on first run (see schema.sql).
# If the database is unreachable, the app falls back to in-memory storage so the
# UI still launches — but data will not persist across restarts.
#
# SECURITY NOTE: do not commit real credentials. Prefer git-ignoring this file
# or overriding db.password via an environment-specific copy.
# =============================================================================

db.url=jdbc:mysql://localhost:3306/smarttask?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
db.user=smarttask
db.password=
